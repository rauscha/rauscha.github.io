document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"dcd00a34-6e43-4326-860a-48b3a9c77141\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  *{margin:0;padding:0;box-sizing:border-box}\n  html,body{height:100%}\n  body{font-family:'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;background:#efe9e3}\n  input[type=range]{-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;background:#e2d8d0;outline:none;accent-color:#800000}\n  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;border-radius:50%;background:#800000;cursor:pointer;box-shadow:0 2px 6px rgba(90,10,20,.4)}\n  input[type=range]::-moz-range-thumb{width:22px;height:22px;border:none;border-radius:50%;background:#800000;cursor:pointer}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;background:#efe9e3;color:#1d1416;font-family:'Helvetica Neue',Arial,sans-serif;padding:30px 36px 44px\">\n  <div style=\"max-width:1320px;margin:0 auto\">\n\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px\">\n      <div>\n        <div style=\"font-size:15px;letter-spacing:.26em;color:#800000;font-weight:700\">PHASE 1 · INTERACTIVE DEMONSTRATION<\u002Fdiv>\n        <h1 style=\"font-size:38px;font-weight:700;letter-spacing:-.01em;margin-top:8px\">Multimodal fusion, live<\u002Fh1>\n        <div style=\"font-size:18px;color:#6a5a52;margin-top:6px;max-width:760px;line-height:1.4\">Adjust a patient's inputs and watch each modality encode, fuse, and drive a malignancy probability — the OvcaFinder-style Phase 1 pipeline, made tangible.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:flex-end;gap:12px\">\n        <img src=\"c149452e-870c-4c8f-b957-a191bc216baf\" style=\"height:34px\">\n        <div style=\"background:#fbe7e7;border:1px solid #eccaca;color:#9a2222;font-size:13px;font-weight:700;letter-spacing:.04em;padding:7px 14px;border-radius:20px\">ILLUSTRATIVE MODEL · NOT FOR CLINICAL USE<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;gap:10px;margin:22px 0 18px;align-items:center\">\n      <span style=\"font-size:14px;letter-spacing:.1em;color:#9a8f8a;font-weight:700;margin-right:4px\">TRY A PRESET<\u002Fspan>\n      <button onclick=\"{{ presetBenign }}\" style=\"background:#fff;border:1px solid #d9e6d6;color:#4d6b2f;font-size:15px;font-weight:700;padding:9px 18px;border-radius:22px;cursor:pointer\" style-hover=\"background:#eef3e9\">Benign-appearing<\u002Fbutton>\n      <button onclick=\"{{ presetMid }}\" style=\"background:#fff;border:1px solid #f0ddc6;color:#a85e00;font-size:15px;font-weight:700;padding:9px 18px;border-radius:22px;cursor:pointer\" style-hover=\"background:#fbf3ea\">Indeterminate<\u002Fbutton>\n      <button onclick=\"{{ presetHigh }}\" style=\"background:#fff;border:1px solid #e0c5c5;color:#7a1414;font-size:15px;font-weight:700;padding:9px 18px;border-radius:22px;cursor:pointer\" style-hover=\"background:#f3e6e6\">Suspicious<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:360px 1fr 380px;gap:18px;align-items:stretch\">\n\n      <div style=\"background:#fff;border:1px solid #e6dcd4;border-radius:14px;padding:26px 26px;box-shadow:0 18px 50px -34px rgba(0,0,0,.3)\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:22px\"><div style=\"width:28px;height:28px;border-radius:8px;background:#800000;color:#fff;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center\">1<\u002Fdiv><div style=\"font-size:19px;font-weight:700\">Patient inputs<\u002Fdiv><\u002Fdiv>\n\n        <div style=\"margin-bottom:22px\">\n          <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px\"><span style=\"display:flex;align-items:center;gap:8px;font-size:16px;color:#3a302c\"><span style=\"width:10px;height:10px;border-radius:50%;background:#007396\"><\u002Fspan>Ultrasound DL score<\u002Fspan><span style=\"font-size:18px;font-weight:700;color:#007396\">{{ usDLdisp }}<\u002Fspan><\u002Fdiv>\n          <input type=\"range\" min=\"0\" max=\"1\" step=\"0.01\" value=\"{{ usDL }}\" oninput=\"{{ setUs }}\" style=\"width:100%\">\n        <\u002Fdiv>\n\n        <div style=\"margin-bottom:22px\">\n          <div style=\"font-size:16px;color:#3a302c;margin-bottom:9px\">O-RADS category<\u002Fdiv>\n          <div style=\"display:flex;gap:7px\">\n            <sc-for list=\"{{ oradsOpts }}\" as=\"o\" hint-placeholder-count=\"4\">\n              <button data-val=\"{{ o.val }}\" onclick=\"{{ setOradsEvt }}\" style=\"flex:1;padding:11px 0;border-radius:8px;font-size:17px;font-weight:700;cursor:pointer;border:1px solid {{ o.border }};background:{{ o.bg }};color:{{ o.color }}\">{{ o.val }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-bottom:22px\">\n          <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px\"><span style=\"font-size:16px;color:#3a302c\">CA-125<\u002Fspan><span style=\"font-size:18px;font-weight:700;color:{{ ca125color }}\">{{ ca125 }} <span style=\"font-size:13px;color:#9a8f8a;font-weight:400\">U/mL<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <input type=\"range\" min=\"0\" max=\"500\" step=\"1\" value=\"{{ ca125 }}\" oninput=\"{{ setCa125 }}\" style=\"width:100%\">\n          <div style=\"font-size:13px;color:#9a8f8a;margin-top:4px\">Threshold for elevation: 35 U/mL<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-bottom:22px\">\n          <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px\"><span style=\"font-size:16px;color:#3a302c\">HE4<\u002Fspan><span style=\"font-size:18px;font-weight:700;color:#1d1416\">{{ he4 }} <span style=\"font-size:13px;color:#9a8f8a;font-weight:400\">pmol/L<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <input type=\"range\" min=\"20\" max=\"600\" step=\"1\" value=\"{{ he4 }}\" oninput=\"{{ setHe4 }}\" style=\"width:100%\">\n        <\u002Fdiv>\n\n        <div style=\"margin-bottom:22px\">\n          <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px\"><span style=\"font-size:16px;color:#3a302c\">Age<\u002Fspan><span style=\"font-size:18px;font-weight:700;color:#1d1416\">{{ age }} <span style=\"font-size:13px;color:#9a8f8a;font-weight:400\">yrs<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <input type=\"range\" min=\"20\" max=\"85\" step=\"1\" value=\"{{ age }}\" oninput=\"{{ setAge }}\" style=\"width:100%\">\n        <\u002Fdiv>\n\n        <div>\n          <div style=\"font-size:16px;color:#3a302c;margin-bottom:9px\">Menopausal status<\u002Fdiv>\n          <div style=\"display:flex;gap:7px\">\n            <button data-val=\"pre\" onclick=\"{{ setMenoEvt }}\" style=\"flex:1;padding:11px 0;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;border:1px solid {{ preBorder }};background:{{ preBg }};color:{{ preColor }}\">Pre<\u002Fbutton>\n            <button data-val=\"post\" onclick=\"{{ setMenoEvt }}\" style=\"flex:1;padding:11px 0;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;border:1px solid {{ postBorder }};background:{{ postBg }};color:{{ postColor }}\">Post<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #e6dcd4;border-radius:14px;padding:26px 30px;box-shadow:0 18px 50px -34px rgba(0,0,0,.3);display:flex;flex-direction:column\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:6px\"><div style=\"width:28px;height:28px;border-radius:8px;background:#800000;color:#fff;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center\">2<\u002Fdiv><div style=\"font-size:19px;font-weight:700\">Encode &amp; fuse<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-size:16px;color:#6a5a52;margin-bottom:20px\">Each input is encoded into a feature, then an intermediate-fusion model (Random Forest) weighs how each pushes toward <span style=\"color:#800000;font-weight:700\">malignant<\u002Fspan> or <span style=\"color:#007396;font-weight:700\">benign<\u002Fspan>.<\u002Fdiv>\n\n        <div style=\"flex:1\">\n          <sc-for list=\"{{ contribs }}\" as=\"c\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:15px\">\n              <div style=\"width:190px;font-size:16px;color:#3a302c;text-align:right;line-height:1.2\">{{ c.name }}<\u002Fdiv>\n              <div style=\"flex:1;display:flex;align-items:center\">\n                <div style=\"flex:1;display:flex;justify-content:flex-end\"><div style=\"height:24px;border-radius:5px 0 0 5px;background:#007396;width:{{ c.leftW }}%\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"width:2px;height:34px;background:#d6cabf;flex:0 0 auto\"><\u002Fdiv>\n                <div style=\"flex:1;display:flex;justify-content:flex-start\"><div style=\"height:24px;border-radius:0 5px 5px 0;background:#800000;width:{{ c.rightW }}%\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"width:54px;font-size:15px;font-weight:700;color:{{ c.valColor }};text-align:right\">{{ c.signed }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;justify-content:space-between;font-size:13px;letter-spacing:.08em;color:#9a8f8a;font-weight:700;border-top:1px solid #efe7e0;padding-top:14px;margin-top:6px\">\n          <span>← PUSHES BENIGN<\u002Fspan><span>PUSHES MALIGNANT →<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#1d1416;border-radius:14px;padding:26px 28px;box-shadow:0 18px 50px -30px rgba(0,0,0,.5);display:flex;flex-direction:column;color:#fff\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:18px\"><div style=\"width:28px;height:28px;border-radius:8px;background:#EAAA00;color:#1d1416;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center\">3<\u002Fdiv><div style=\"font-size:19px;font-weight:700\">Prediction<\u002Fdiv><\u002Fdiv>\n\n        <div style=\"position:relative;width:240px;height:240px;margin:6px auto 4px\">\n          <svg viewBox=\"0 0 220 220\" style=\"width:240px;height:240px\">\n            <circle cx=\"110\" cy=\"110\" r=\"92\" fill=\"none\" stroke=\"#332925\" stroke-width=\"20\"><\u002Fcircle>\n            <circle cx=\"110\" cy=\"110\" r=\"92\" fill=\"none\" stroke=\"{{ bandColor }}\" stroke-width=\"20\" stroke-linecap=\"round\" stroke-dasharray=\"{{ gaugeDash }}\" transform=\"rotate(-90 110 110)\"><\u002Fcircle>\n          <\u002Fsvg>\n          <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center\">\n            <div style=\"font-size:62px;font-weight:700;line-height:1;color:#fff\">{{ probPct }}<span style=\"font-size:30px\">%<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size:15px;color:#a99c93;letter-spacing:.06em;margin-top:4px\">malignancy probability<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:{{ bandSoft }};border:1px solid {{ bandColor }};border-radius:10px;padding:16px 20px;margin-top:14px;text-align:center\">\n          <div style=\"font-size:14px;letter-spacing:.1em;font-weight:700;color:{{ bandColor }}\">{{ bandLabel }}<\u002Fdiv>\n          <div style=\"font-size:21px;font-weight:700;color:#fff;margin-top:6px;line-height:1.2\">{{ actionText }}<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:auto;padding-top:18px;border-top:1px solid #332925;display:flex;align-items:center;gap:16px\">\n          <div style=\"font-size:34px;font-weight:700;color:#EAAA00;line-height:1\">0.978<\u002Fdiv>\n          <div style=\"font-size:14px;color:#a99c93;line-height:1.35\">Reference AUC for this 2-modality pipeline (OvcaFinder). The proposal fuses <b style=\"color:#fff\">four<\u002Fb> streams.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <div style=\"text-align:center;font-size:13px;color:#a99488;margin-top:22px;line-height:1.5\">Demonstration model with illustrative weights for teaching the fusion concept · not validated and not for clinical decision-making.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1400,&quot;height&quot;:880}}\">\nclass Component extends DCLogic {\n  state = { usDL: 0.35, orads: 3, ca125: 45, he4: 60, age: 52, postmeno: true };\n\n  clamp(x, lo, hi){ return Math.max(lo, Math.min(hi, x)); }\n\n  compute(s){\n    const oradsMap = {2:-2.2, 3:-0.5, 4:1.4, 5:2.7};\n    const he4thr = s.postmeno ? 140 : 70;\n    const raw = {\n      us:    3.4 * (s.usDL - 0.40),\n      orads: oradsMap[s.orads],\n      ca125: 1.3 * this.clamp((s.ca125 - 35)/180, 0, 1.3),\n      he4:   1.0 * this.clamp((s.he4 - he4thr)/160, -0.2, 1.3),\n      age:   0.8 * this.clamp((s.age - 50)/22, -1, 1.2),\n      meno:  s.postmeno ? 0.45 : -0.35\n    };\n    const scale = 0.5;\n    const terms = {};\n    for (const k in raw) terms[k] = raw[k] * scale;\n    const intercept = -0.8;\n    let logit = intercept;\n    for (const k in terms) logit += terms[k];\n    const prob = 1/(1+Math.exp(-logit));\n    return { terms, prob };\n  }\n\n  renderVals(){\n    const s = this.state;\n    const { terms, prob } = this.compute(s);\n\n    const names = {\n      us: 'Ultrasound DL score', orads: 'O-RADS category', ca125: 'CA-125',\n      he4: 'HE4', age: 'Age', meno: 'Menopausal status'\n    };\n    const order = Object.keys(terms).sort((a,b)=>Math.abs(terms[b])-Math.abs(terms[a]));\n    const maxAbs = Math.max(1.4, ...Object.values(terms).map(Math.abs));\n    const contribs = order.map(k=>{\n      const v = terms[k];\n      const w = Math.min(100, Math.abs(v)/maxAbs*100);\n      return {\n        name: names[k],\n        leftW: v < 0 ? w : 0,\n        rightW: v > 0 ? w : 0,\n        signed: (v>=0?'+':'') + v.toFixed(2),\n        valColor: v >= 0 ? '#800000' : '#007396'\n      };\n    });\n\n    // bands\n    let bandLabel, bandColor, bandSoft, actionText;\n    if (prob < 0.12){ bandLabel='LOW RISK'; bandColor='#789D49'; bandSoft='#1e2417'; actionText='Watchful waiting / interval follow-up'; }\n    else if (prob < 0.55){ bandLabel='INTERMEDIATE RISK'; bandColor='#DE7C00'; bandSoft='#2a1d0e'; actionText='Expedited GYN-Oncology referral'; }\n    else { bandLabel='HIGH RISK'; bandColor='#c14a4a'; bandSoft='#2a1012'; actionText='Surgical referral'; }\n\n    const circ = 2 * Math.PI * 92;\n    const gaugeDash = (prob*circ).toFixed(1) + ' ' + circ.toFixed(1);\n\n    // segmented styling\n    const oradsOpts = [2,3,4,5].map(val=>{\n      const active = val === s.orads;\n      return { val, bg: active?'#800000':'#faf5f2', color: active?'#fff':'#6a5a52', border: active?'#800000':'#e6dcd4' };\n    });\n    const seg = (active)=>({ bg: active?'#800000':'#faf5f2', color: active?'#fff':'#6a5a52', border: active?'#800000':'#e6dcd4' });\n    const pre = seg(!s.postmeno), post = seg(s.postmeno);\n\n    return {\n      usDL: s.usDL, usDLdisp: s.usDL.toFixed(2),\n      orads: s.orads, oradsOpts,\n      ca125: s.ca125, ca125color: s.ca125>35 ? '#a85e00' : '#1d1416',\n      he4: s.he4, age: s.age,\n      preBg: pre.bg, preColor: pre.color, preBorder: pre.border,\n      postBg: post.bg, postColor: post.color, postBorder: post.border,\n      contribs,\n      probPct: Math.round(prob*100),\n      bandLabel, bandColor, bandSoft, actionText, gaugeDash,\n      setUs: e=>this.setState({usDL: parseFloat(e.target.value)}),\n      setCa125: e=>this.setState({ca125: parseInt(e.target.value)}),\n      setHe4: e=>this.setState({he4: parseInt(e.target.value)}),\n      setAge: e=>this.setState({age: parseInt(e.target.value)}),\n      setOradsEvt: e=>this.setState({orads: parseInt(e.currentTarget.dataset.val)}),\n      setMenoEvt: e=>this.setState({postmeno: e.currentTarget.dataset.val==='post'}),\n      presetBenign: ()=>this.setState({usDL:0.12, orads:2, ca125:18, he4:42, age:34, postmeno:false}),\n      presetMid: ()=>this.setState({usDL:0.46, orads:3, ca125:62, he4:95, age:51, postmeno:true}),\n      presetHigh: ()=>this.setState({usDL:0.83, orads:5, ca125:320, he4:285, age:67, postmeno:true})\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
